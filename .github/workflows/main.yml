name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print hello
        run: echo "Hello from GitHub Actions"

      - name: Show current folder
        run: ls -la

      - name: Show date
        run: date
